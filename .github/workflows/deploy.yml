  name: Deploy Jobotron                                                                                                                                                                                                                             
                                                        
  on:      
    push:                 
      branches:
        - main
        - scraping-issues-fix                                                                                                                                                                                                                       
           
  jobs:                                                                                                                                                                                                                                             
    deploy:                                             
      runs-on: ubuntu-latest                                                                                                                                                                                                                        
      steps:                                                                                                                                                                                                                                        
        - name: Deploy to server                                                                                                                                                                                                                    
          uses: appleboy/ssh-action@v1.0.3                                                                                                                                                                                                          
          with:                                                                                                                                                                                                                                     
            host: ${{ secrets.SERVER_HOST }}                                                                                                                                                                                                        
            username: root                                                                                                                                                                                                                          
            key: ${{ secrets.SERVER_SSH_KEY }}                                                                                                                                                                                                      
            script: |                                                                                                                                                                                                                               
              cd /opt/Jobotron                                                                                                                                                                                                                      
              git pull                                                                                                                                                                                                                              
              systemctl restart jobotron    